services:
  - type: web
    name: erp-quote-ingestor-api
    runtime: node
    region: oregon
    plan: free
    rootDir: api
    buildCommand: npm ci && npm run prisma:generate && npm run build
    preDeployCommand: npm run prisma:migrate:deploy
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
