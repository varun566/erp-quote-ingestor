services:
  - type: web
    name: erp-quote-ingestor-api
    runtime: node
    region: oregon
    plan: free
    rootDir: api
    buildCommand: npm ci && npm run prisma:generate && npm run build
    startCommand: sh -c "npm run prisma:migrate:deploy && npm run start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
